# Optional: Render Blueprint — dashboard 里也可手动选 Python + 下面两条命令
services:
  - type: web
    name: dify-ppt-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
